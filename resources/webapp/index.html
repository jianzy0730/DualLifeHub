function periodCalendar(items){const allowed=allowedPeriodOwners(),[y,m]=state.periodMonth.split('-').map(Number),days=new Date(y,m,0).getDate(),offset=(new Date(y,m-1,1).getDay()+6)%7,week=['一','二','三','四','五','六','日'];let cells='';for(let i=0;i<offset;i++)cells+='<button class="cal-day blank"></button>';for(let d=1;d<=days;d++){const date=`${state.periodMonth}-${String(d).padStart(2,'0')}`,records=items.filter(x=>dateInPeriod(date,x)),owners=new Set(records.map(x=>x.owner));cells+=`<button class="cal-day ${records.length?'has-record':''} ${date===today()?'today':''}" onclick="openCalendarDate('${date}')"><span class="day-num">${d}</span><span class="cal-marks">${owners.has('user')?'<i class="cal-mark"></i>':''}${owners.has('ai')?'<i class="cal-mark ai"></i>':''}</span></button>`}const legend=allowed.length>1?`<div class="calendar-legend">${allowed.includes('user')?'<span><i class="legend-pill"></i>我的</span>':''}${allowed.includes('ai')?`<span><i class="legend-pill ai"></i>${esc(aiName())}的</span>`:''}</div>`:'';return `<div class="calendar-card"><div class="calendar-week">${week.map(x=>`<span>${x}</span>`).join('')}</div><div class="calendar-grid">${cells}</div>${legend}</div>`}

function confirmCategoryDelete(encoded){const name=decodeURIComponent(encoded);$('#overlay').innerHTML=`<div class="sheet-wrap confirm"><div class="dialog"><h3>删除“${esc(name)}”？</h3><p>已有记录会自动归到“其他”。</p><div class="dialog-actions"><button onclick="openCategories()">取消</button><button class="danger" onclick="deleteCategory('${encoded}')">删除</button></div></div></div>`}
async function deleteCategory(encoded){try{await request('/categories/'+encoded,{method:'DELETE'});state.txCategory='自动';state.reviewCategory='all';closeSheet();await load();openCategories();toast('已删除')}catch(e){toast(e.message)}}
function confirmDelete(kind,id){const labels={memo:'这条备忘',transaction:'这笔记录',period:'这条生理期记录'};$('#overlay').innerHTML=`<div class="sheet-wrap confirm"><div class="dialog"><h3>删除${labels[kind]||'这条记录'}？</h3><p>删除后不会再显示。</p><div class="dialog-actions"><button onclick="closeSheet()">取消</button><button class="danger" onclick="deleteItem('${kind}','${id}')">删除</button></div></div></div>`}
async function deleteItem(kind,id){try{const path=kind==='memo'?'/memos/'+id:kind==='period'?'/periods/'+id:'/transactions/'+id;await request(path,{method:'DELETE'});closeSheet();await load();toast('已删除',kind==='period'?null:{label:'撤销',onClick:async()=>{await request('/restore/'+kind+'/'+id,{method:'POST'});await load();toast('已恢复')}})}catch(e){toast(e.message)}}
function closeSheet(){$('#overlay').innerHTML=''}
load();
</script>
</body>
</html>
